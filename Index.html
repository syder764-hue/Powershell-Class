<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PowerShell Cyber Deck</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at 20% 20%, #00e5ff20, transparent),
              radial-gradient(circle at 80% 30%, #a855f720, transparent),
              #05070d;
  color: white;
  overflow: hidden;
}

.slide {
  display: none;
  height: 100vh;
  padding: 80px;
}

.active {
  display: block;
}

h1 {
  font-size: 60px;
  margin-bottom: 20px;
}

.panel {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  max-width: 500px;
  box-shadow: 0 0 40px rgba(0,229,255,0.2);
}

.badge {
  background: red;
  padding: 8px 14px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 10px;
}

.nav {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

button {
  padding: 10px 20px;
  background: #00e5ff;
  border: none;
  margin: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="slide active">
  <h1>Why PowerShell Matters</h1>
  <div class="panel">
    <div class="badge">LIVE CLASS</div>
    <p>Faster investigations</p>
    <p>Direct access to logs</p>
    <p>Repeatable workflows</p>
  </div>
</div>

<div class="slide">
  <h1>Log Analysis</h1>
  <div class="panel">
    <p>Multiple failed logins</p>
    <p>Same IP detected</p>
    <p>Brute force pattern</p>
  </div>
</div>

<div class="slide">
  <h1>PowerShell Advantage</h1>
  <div class="panel">
    <p>Query logs instantly</p>
    <p>Filter by Event ID</p>
    <p>Automate analysis</p>
  </div>
</div>

<div class="nav">
  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(i){
  slides.forEach(s => s.classList.remove("active"));
  slides[i].classList.add("active");
}

function next(){
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prev(){
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}
</script>

</body>
</html>
